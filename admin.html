<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JS매매상사 관리자</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans KR', sans-serif; background: #f5f5f5; color: #333; }
    header {
      background: #1a3a5c;
      color: white;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 20px; font-weight: 700; }
    .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }
    .card h2 { font-size: 18px; font-weight: 700; margin-bottom: 16px; color: #1a3a5c; }
    select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      margin-bottom: 16px;
    }
    .upload-area {
      border: 2px dashed #ddd;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }
    .upload-area:hover { border-color: #1a3a5c; }
    .upload-area p { color: #999; font-size: 14px; margin-top: 8px; }
    #fileInput { display: none; }
    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .preview-item {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
    }
    .preview-item img {
      width: 100%;
      height: 120px;
      object-fit: cover;
    }
    .preview-item .delete-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      background: rgba(0,0,0,0.6);
      color: white;
      border: none;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .preview-item .uploading {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 12px;
    }
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    .btn-primary { background: #1a3a5c; color: white; }
    .btn-primary:hover { background: #2a5a8c; }
    .btn-primary:disabled { background: #aaa; cursor: not-allowed; }
    .msg {
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      margin-top: 12px;
      display: none;
    }
    .msg.success { background: #d4edda; color: #155724; display: block; }
    .msg.error { background: #f8d7da; color: #721c24; display: block; }
    .existing-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
    }
    .existing-item {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
    }
    .existing-item img {
      width: 100%;
      height: 120px;
      object-fit: cover;
    }
    .existing-item .delete-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      background: rgba(220,53,69,0.8);
      color: white;
      border: none;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .no-photo { color: #999; font-size: 14px; text-align: center; padding: 20px; }
  </style>
</head>
<body>

<header>
  <h1>🚛 JS매매상사 관리자</h1>
  <span style="font-size:13px;opacity:0.8;">사진 관리</span>
</header>

<div class="container">

  <div class="card">
    <h2>📋 매물 선택</h2>
    <select id="vehicleSelect" onchange="loadExistingPhotos()">
      <option value="">매물을 선택하세요</option>
    </select>
  </div>

  <div class="card" id="uploadCard" style="display:none;">
    <h2>📸 사진 업로드</h2>
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
      <div style="font-size:40px;">📁</div>
      <p>클릭하여 사진 선택 (여러 장 동시 선택 가능)</p>
      <p>JPG, PNG 지원 / 장당 최대 10MB</p>
    </div>
    <input type="file" id="fileInput" multiple accept="image/*" onchange="previewFiles(event)">
    <div class="preview-grid" id="previewGrid"></div>
    <button class="btn btn-primary" id="uploadBtn" onclick="uploadPhotos()" style="display:none;">
      사진 업로드하기
    </button>
    <div class="msg" id="uploadMsg"></div>
  </div>

  <div class="card" id="existingCard" style="display:none;">
    <h2>🖼️ 등록된 사진</h2>
    <div id="existingGrid"></div>
  </div>

</div>

<script>
  const SUPABASE_URL = 'https://dreclszbtnmwfaigifpg.supabase.co';
  const SUPABASE_KEY = '여기에_anon_키_붙여넣기';

  let selectedFiles = [];
  let currentVehicleId = null;

  // 매물 목록 불러오기
  async function loadVehicles() {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/vehicles?select=id,plate_number,model_name&order=created_at.desc`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    const vehicles = await res.json();
    const sel = document.getElementById('vehicleSelect');
    vehicles.forEach(v => {
      const opt = document.createElement('option');
      opt.value = v.id;
      opt.textContent = `${v.plate_number} | ${v.model_name}`;
      sel.appendChild(opt);
    });
  }

  // 기존 사진 불러오기
  async function loadExistingPhotos() {
    const vehicleId = document.getElementById('vehicleSelect').value;
    if (!vehicleId) {
      document.getElementById('uploadCard').style.display = 'none';
      document.getElementById('existingCard').style.display = 'none';
      return;
    }
    currentVehicleId = vehicleId;
    document.getElementById('uploadCard').style.display = 'block';
    document.getElementById('existingCard').style.display = 'block';

    const res = await fetch(`${SUPABASE_URL}/rest/v1/vehicle_images?vehicle_id=eq.${vehicleId}&order=order_index.asc`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    const imgs = await res.json();
    const grid = document.getElementById('existingGrid');

    if (imgs.length === 0) {
      grid.innerHTML = '<div class="no-photo">등록된 사진이 없습니다.</div>';
      return;
    }

    grid.innerHTML = imgs.map(img => `
      <div class="existing-item" id="img-${img.id}">
        <img src="${img.image_url}" alt="차량사진">
        <button class="delete-btn" onclick="deletePhoto(${img.id}, '${img.image_url}')">✕</button>
      </div>
    `).join('');
  }

  // 사진 미리보기
  function previewFiles(event) {
    selectedFiles = Array.from(event.target.files);
    const grid = document.getElementById('previewGrid');
    grid.innerHTML = selectedFiles.map((file, i) => `
      <div class="preview-item" id="preview-${i}">
        <img src="${URL.createObjectURL(file)}" alt="미리보기">
        <button class="delete-btn" onclick="removeFile(${i})">✕</button>
      </div>
    `).join('');
    document.getElementById('uploadBtn').style.display = selectedFiles.length > 0 ? 'block' : 'none';
  }

  // 파일 제거
  function removeFile(index) {
    selectedFiles.splice(index, 1);
    const grid = document.getElementById('previewGrid');
    grid.innerHTML = selectedFiles.map((file, i) => `
      <div class="preview-item" id="preview-${i}">
        <img src="${URL.createObjectURL(file)}" alt="미리보기">
        <button class="delete-btn" onclick="removeFile(${i})">✕</button>
      </div>
    `).join('');
    document.getElementById('uploadBtn').style.display = selectedFiles.length > 0 ? 'block' : 'none';
  }

  // 사진 업로드
  async function uploadPhotos() {
    if (!currentVehicleId || selectedFiles.length === 0) return;

    const btn = document.getElementById('uploadBtn');
    btn.disabled = true;
    btn.textContent = '업로드 중...';

    const msg = document.getElementById('uploadMsg');
    msg.className = 'msg';

    let successCount = 0;

    for (let i = 0; i < selectedFiles.length; i++) {
      const file = selectedFiles[i];
      const ext = file.name.split('.').pop();
      const fileName = `${currentVehicleId}/${Date.now()}_${i}.${ext}`;

      // Storage에 업로드
      const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/vehicle-images/${fileName}`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY,
          'Content-Type': file.type,
        },
        body: file,
      });

      if (uploadRes.ok) {
        const imageUrl = `${SUPABASE_URL}/storage/v1/object/public/vehicle-images/${fileName}`;

        // DB에 저장
        await fetch(`${SUPABASE_URL}/rest/v1/vehicle_images`, {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': 'Bearer ' + SUPABASE_KEY,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal',
          },
          body: JSON.stringify({
            vehicle_id: Number(currentVehicleId),
            image_url: imageUrl,
            order_index: i,
          }),
        });
        successCount++;
      }
    }

    btn.disabled = false;
    btn.textContent = '사진 업로드하기';
    selectedFiles = [];
    document.getElementById('previewGrid').innerHTML = '';
    document.getElementById('fileInput').value = '';

    if (successCount > 0) {
      msg.textContent = `${successCount}장 업로드 완료!`;
      msg.className = 'msg success';
      loadExistingPhotos();
    } else {
      msg.textContent = '업로드 실패. 다시 시도해주세요.';
      msg.className = 'msg error';
    }
  }

  // 사진 삭제
  async function deletePhoto(imgId, imageUrl) {
    if (!confirm('이 사진을 삭제할까요?')) return;

    // Storage에서 삭제
    const path = imageUrl.split('vehicle-images/')[1];
    await fetch(`${SUPABASE_URL}/storage/v1/object/vehicle-images/${path}`, {
      method: 'DELETE',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
      },
    });

    // DB에서 삭제
    await fetch(`${SUPABASE_URL}/rest/v1/vehicle_images?id=eq.${imgId}`, {
      method: 'DELETE',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
      },
    });

    document.getElementById(`img-${imgId}`).remove();
  }

  loadVehicles();
</script>
</body>
</html>
