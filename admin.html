<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JS매매상사 관리자</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans KR', sans-serif; background: #f5f5f5; color: #333; }
    header {
      background: #1a3a5c;
      color: white;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 20px; font-weight: 700; }
    .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }
    .card h2 { font-size: 18px; font-weight: 700; margin-bottom: 16px; color: #1a3a5c; }
    select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      margin-bottom: 8px;
    }
    .legend {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
      font-size: 13px;
      color: #666;
    }
    .legend span { display: flex; align-items: center; gap: 4px; }
    .upload-area {
      border: 2px dashed #ddd;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }
    .upload-area:hover { border-color: #1a3a5c; }
    .upload-area p { color: #999; font-size: 14px; margin-top: 8px; }
    #fileInput { display: none; }
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-bottom: 8px;
    }
    .btn-primary { background: #1a3a5c; color: white; }
    .btn-primary:hover { background: #2a5a8c; }
    .btn-primary:disabled { background: #aaa; cursor: not-allowed; }
    .btn-success { background: #28a745; color: white; }
    .btn-success:hover { background: #218838; }
    .btn-success:disabled { background: #aaa; cursor: not-allowed; }
    .btn-warning { background: #dc3545; color: white; }
    .btn-warning:hover { background: #c82333; }
    .msg {
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      margin-top: 12px;
      display: none;
    }
    .msg.success { background: #d4edda; color: #155724; display: block; }
    .msg.error { background: #f8d7da; color: #721c24; display: block; }
    .msg.info { background: #d1ecf1; color: #0c5460; display: block; }
    .sortable-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .sortable-item {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      cursor: grab;
      border: 2px solid transparent;
      transition: border-color 0.2s;
    }
    .sortable-item:active { cursor: grabbing; }
    .sortable-item.sortable-chosen { border-color: #1a3a5c; opacity: 0.8; }
    .sortable-item.sortable-ghost { opacity: 0.3; }
    .sortable-item img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      pointer-events: none;
      user-select: none;
    }
    .sortable-item .delete-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      background: rgba(220,53,69,0.8);
      color: white;
      border: none;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .order-badge {
      position: absolute;
      bottom: 4px;
      left: 4px;
      background: rgba(0,0,0,0.6);
      color: white;
      border-radius: 12px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 700;
      pointer-events: none;
    }
    .first-badge {
      position: absolute;
      bottom: 4px;
      right: 4px;
      background: #ffd700;
      color: #333;
      border-radius: 12px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 700;
      pointer-events: none;
    }
    .new-badge {
      position: absolute;
      top: 4px;
      left: 4px;
      background: #28a745;
      color: white;
      border-radius: 12px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 700;
      pointer-events: none;
    }
    .drag-hint {
      font-size: 13px;
      color: #999;
      margin-bottom: 12px;
      text-align: center;
    }
    .no-photo { color: #999; font-size: 14px; text-align: center; padding: 20px; }
    .compress-info {
      font-size: 12px;
      color: #28a745;
      margin-bottom: 8px;
      text-align: center;
    }
    .sold-cleanup-card {
      border: 1px solid #dc3545;
    }
    .sold-cleanup-card h2 { color: #dc3545; }
  </style>
</head>
<body>

<header>
  <h1>🚛 JS매매상사 관리자</h1>
  <span style="font-size:13px;opacity:0.8;">사진 관리</span>
</header>

<div class="container">

  <div class="card">
    <h2>📋 매물 선택</h2>
    <div class="legend">
      <span>📸 사진 있음</span>
      <span>🚫 사진 없음</span>
      <span>✅ 판매완료</span>
    </div>
    <select id="vehicleSelect" onchange="loadPhotos()">
      <option value="">매물을 선택하세요</option>
    </select>
  </div>

  <div id="photoCard" style="display:none;">
    <div class="card">
      <h2>🖼️ 사진 관리</h2>
      <div class="drag-hint">📌 드래그로 순서 변경 가능 · 첫 번째 사진이 대표사진이에요</div>
      <div class="sortable-grid" id="allPhotosGrid"></div>
      <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <div style="font-size:36px;">➕</div>
        <p>클릭하여 사진 추가 (여러 장 동시 선택 가능)</p>
        <p>JPG, PNG 지원 / 자동 압축 적용됨</p>
      </div>
      <input type="file" id="fileInput" multiple accept="image/*" onchange="addNewPhotos(event)">
      <div class="compress-info" id="compressInfo"></div>
      <button class="btn btn-success" id="saveBtn" onclick="saveAll()">✅ 저장하기</button>
      <div class="msg" id="saveMsg"></div>
    </div>
  </div>

  <!-- 판매완료 차량 사진 정리 -->
  <div class="card sold-cleanup-card">
    <h2>🗑️ 판매완료 차량 사진 정리</h2>
    <p style="font-size:14px;color:#666;margin-bottom:16px;">판매완료 차량의 대표사진만 남기고 나머지 사진을 자동 삭제해요.</p>
    <button class="btn btn-warning" onclick="cleanupSoldPhotos()">판매완료 차량 사진 정리하기</button>
    <div class="msg" id="cleanupMsg"></div>
  </div>

</div>

<script>
  const SUPABASE_URL = 'https://dreclszbtnmwfaigifpg.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRyZWNsc3pidG5td2ZhaWdpZnBnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxMjExMjMsImV4cCI6MjA5ODY5NzEyM30.IGNa8gHPb7RmYMy7h3gVa9TCgTxD2Mhon4WpA81TybE';

  let currentVehicleId = null;
  let existingPhotos = [];
  let newFiles = [];
  let deletedIds = [];
  let sortableInstance = null;

  // 사진 압축 함수
  function compressImage(file, maxWidth = 1200, quality = 0.75) {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let width = img.width;
          let height = img.height;

          if (width > maxWidth) {
            height = Math.round(height * maxWidth / width);
            width = maxWidth;
          }

          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);

          canvas.toBlob((blob) => {
            const compressedFile = new File([blob], file.name.replace(/\.[^.]+$/, '.jpg'), {
              type: 'image/jpeg',
              lastModified: Date.now(),
            });
            resolve(compressedFile);
          }, 'image/jpeg', quality);
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  // 매물 목록 불러오기 (사진 등록 여부 포함)
  async function loadVehicles() {
    const [vehiclesRes, imagesRes] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/vehicles?select=id,plate_number,model_name,status&order=sort_order.asc.nullslast,created_at.desc`, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
      }),
      fetch(`${SUPABASE_URL}/rest/v1/vehicle_images?select=vehicle_id&order=order_index.asc`, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
      })
    ]);

    const vehicles = await vehiclesRes.json();
    const images = await imagesRes.json();

    // 사진 있는 vehicle_id 목록
    const vehicleIdsWithPhotos = new Set(images.map(img => img.vehicle_id));

    const sel = document.getElementById('vehicleSelect');
    sel.innerHTML = '<option value="">매물을 선택하세요</option>';

    // 판매중 먼저, 판매완료 나중에
    const selling = vehicles.filter(v => v.status !== '판매완료');
    const sold = vehicles.filter(v => v.status === '판매완료');

    if (selling.length > 0) {
      const group1 = document.createElement('optgroup');
      group1.label = '── 판매중 ──';
      selling.forEach(v => {
        const opt = document.createElement('option');
        opt.value = v.id;
        const hasPhoto = vehicleIdsWithPhotos.has(v.id);
        opt.textContent = `${hasPhoto ? '📸' : '🚫'} ${v.plate_number} | ${v.model_name}`;
        group1.appendChild(opt);
      });
      sel.appendChild(group1);
    }

    if (sold.length > 0) {
      const group2 = document.createElement('optgroup');
      group2.label = '── 판매완료 ──';
      sold.forEach(v => {
        const opt = document.createElement('option');
        opt.value = v.id;
        const hasPhoto = vehicleIdsWithPhotos.has(v.id);
        opt.textContent = `✅ ${hasPhoto ? '📸' : '🚫'} ${v.plate_number} | ${v.model_name}`;
        group2.appendChild(opt);
      });
      sel.appendChild(group2);
    }
  }

  // 매물 선택 시 사진 불러오기
  async function loadPhotos() {
    const vehicleId = document.getElementById('vehicleSelect').value;
    if (!vehicleId) {
      document.getElementById('photoCard').style.display = 'none';
      return;
    }
    currentVehicleId = vehicleId;
    newFiles = [];
    deletedIds = [];

    const res = await fetch(`${SUPABASE_URL}/rest/v1/vehicle_images?vehicle_id=eq.${vehicleId}&order=order_index.asc`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    existingPhotos = await res.json();

    document.getElementById('photoCard').style.display = 'block';
    renderAllPhotos();
  }

  function renderAllPhotos() {
    const grid = document.getElementById('allPhotosGrid');

    if (existingPhotos.length === 0 && newFiles.length === 0) {
      grid.innerHTML = '<div class="no-photo">등록된 사진이 없습니다. 아래에서 사진을 추가해주세요.</div>';
      if (sortableInstance) { sortableInstance.destroy(); sortableInstance = null; }
      return;
    }

    const existingHtml = existingPhotos.map((img, i) => `
      <div class="sortable-item" data-type="existing" data-id="${img.id}">
        <img src="${img.image_url}" alt="차량사진">
        <div class="order-badge">${i + 1}번째</div>
        ${i === 0 ? '<div class="first-badge">대표</div>' : ''}
        <button class="delete-btn" onclick="deleteExisting(event, ${img.id})">✕</button>
      </div>
    `).join('');

    const newHtml = newFiles.map((f, i) => `
      <div class="sortable-item" data-type="new" data-index="${i}">
        <img src="${f.previewUrl}" alt="새사진">
        <div class="new-badge">새사진</div>
        <div class="order-badge">${existingPhotos.length + i + 1}번째</div>
        <button class="delete-btn" onclick="deleteNew(event, ${i})">✕</button>
      </div>
    `).join('');

    grid.innerHTML = existingHtml + newHtml;
    updateBadges();

    if (sortableInstance) sortableInstance.destroy();
    sortableInstance = new Sortable(grid, {
      animation: 150,
      ghostClass: 'sortable-ghost',
      chosenClass: 'sortable-chosen',
      onEnd: updateBadges
    });
  }

  function updateBadges() {
    const items = document.querySelectorAll('.sortable-item');
    items.forEach((item, i) => {
      const badge = item.querySelector('.order-badge');
      const firstBadge = item.querySelector('.first-badge');
      if (badge) badge.textContent = `${i + 1}번째`;
      if (firstBadge) firstBadge.remove();
      if (i === 0) {
        const newBadge = document.createElement('div');
        newBadge.className = 'first-badge';
        newBadge.textContent = '대표';
        newBadge.style.pointerEvents = 'none';
        item.appendChild(newBadge);
      }
    });
  }

  // 새 사진 추가 (압축 포함)
  async function addNewPhotos(event) {
    const files = Array.from(event.target.files);
    const compressInfo = document.getElementById('compressInfo');
    compressInfo.textContent = '사진 압축 중...';
    compressInfo.style.display = 'block';

    let totalOriginal = 0;
    let totalCompressed = 0;

    for (const file of files) {
      totalOriginal += file.size;
      const compressed = await compressImage(file);
      totalCompressed += compressed.size;
      newFiles.push({
        file: compressed,
        previewUrl: URL.createObjectURL(compressed)
      });
    }

    const originalMB = (totalOriginal / 1024 / 1024).toFixed(1);
    const compressedMB = (totalCompressed / 1024 / 1024).toFixed(1);
    const ratio = Math.round((1 - totalCompressed / totalOriginal) * 100);
    compressInfo.textContent = `✅ 압축 완료: ${originalMB}MB → ${compressedMB}MB (${ratio}% 절약)`;

    document.getElementById('fileInput').value = '';
    renderAllPhotos();
  }

  function deleteExisting(event, imgId) {
    event.stopPropagation();
    if (!confirm('이 사진을 삭제할까요?')) return;
    deletedIds.push(imgId);
    existingPhotos = existingPhotos.filter(img => img.id !== imgId);
    renderAllPhotos();
  }

  function deleteNew(event, index) {
    event.stopPropagation();
    newFiles.splice(index, 1);
    renderAllPhotos();
  }

  // 전체 저장
  async function saveAll() {
    if (!currentVehicleId) return;

    const btn = document.getElementById('saveBtn');
    btn.disabled = true;
    btn.textContent = '저장 중...';

    const msg = document.getElementById('saveMsg');
    msg.className = 'msg info';
    msg.textContent = '저장 중...';

    try {
      // 1. 삭제할 사진 처리
      for (const imgId of deletedIds) {
        await fetch(`${SUPABASE_URL}/rest/v1/vehicle_images?id=eq.${imgId}`, {
          method: 'DELETE',
          headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY },
        });
      }

      // 2. 새 사진 업로드
      const uploadedUrls = {};
      for (let i = 0; i < newFiles.length; i++) {
        const { file } = newFiles[i];
        const fileName = `${currentVehicleId}/${Date.now()}_${i}.jpg`;

        const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/vehicle-images/${fileName}`, {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': 'Bearer ' + SUPABASE_KEY,
            'Content-Type': 'image/jpeg',
          },
          body: file,
        });

        if (uploadRes.ok) {
          uploadedUrls[i] = `${SUPABASE_URL}/storage/v1/object/public/vehicle-images/${fileName}`;
        }
      }

      // 3. 현재 그리드 순서대로 저장
      const items = document.querySelectorAll('.sortable-item');
      let orderIndex = 0;

      for (const item of items) {
        const type = item.getAttribute('data-type');

        if (type === 'existing') {
          const id = item.getAttribute('data-id');
          await fetch(`${SUPABASE_URL}/rest/v1/vehicle_images?id=eq.${id}`, {
            method: 'PATCH',
            headers: {
              'apikey': SUPABASE_KEY,
              'Authorization': 'Bearer ' + SUPABASE_KEY,
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ order_index: orderIndex }),
          });
          orderIndex++;
        } else if (type === 'new') {
          const index = parseInt(item.getAttribute('data-index'));
          if (uploadedUrls[index]) {
            await fetch(`${SUPABASE_URL}/rest/v1/vehicle_images`, {
              method: 'POST',
              headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': 'Bearer ' + SUPABASE_KEY,
                'Content-Type': 'application/json',
                'Prefer': 'return=minimal',
              },
              body: JSON.stringify({
                vehicle_id: Number(currentVehicleId),
                image_url: uploadedUrls[index],
                order_index: orderIndex,
              }),
            });
            orderIndex++;
          }
        }
      }

      msg.textContent = '저장 완료!';
      msg.className = 'msg success';
      document.getElementById('compressInfo').textContent = '';

      await loadVehicles();
      await loadPhotos();

    } catch (err) {
      msg.textContent = '저장 중 오류가 발생했어요. 다시 시도해주세요.';
      msg.className = 'msg error';
    }

    btn.disabled = false;
    btn.textContent = '✅ 저장하기';
  }

  // 판매완료 차량 사진 정리
  async function cleanupSoldPhotos() {
    if (!confirm('판매완료 차량의 대표사진만 남기고 나머지를 삭제할까요?')) return;

    const msg = document.getElementById('cleanupMsg');
    msg.className = 'msg info';
    msg.textContent = '정리 중...';

    try {
      // 판매완료 차량 목록
      const soldRes = await fetch(`${SUPABASE_URL}/rest/v1/vehicles?status=eq.판매완료&select=id`, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
      });
      const soldVehicles = await soldRes.json();

      let deletedCount = 0;

      for (const v of soldVehicles) {
        // 해당 차량 사진 전체 가져오기 (order_index 순)
        const imgRes = await fetch(`${SUPABASE_URL}/rest/v1/vehicle_images?vehicle_id=eq.${v.id}&order=order_index.asc`, {
          headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
        });
        const imgs = await imgRes.json();

        // 2번째 이후 사진 삭제
        if (imgs.length > 1) {
          for (let i = 1; i < imgs.length; i++) {
            // Storage에서 삭제
            const path = imgs[i].image_url.split('vehicle-images/')[1];
            await fetch(`${SUPABASE_URL}/storage/v1/object/vehicle-images/${path}`, {
              method: 'DELETE',
              headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY },
            });

            // DB에서 삭제
            await fetch(`${SUPABASE_URL}/rest/v1/vehicle_images?id=eq.${imgs[i].id}`, {
              method: 'DELETE',
              headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY },
            });

            deletedCount++;
          }
        }
      }

      msg.textContent = `정리 완료! 사진 ${deletedCount}장 삭제됐어요.`;
      msg.className = 'msg success';
      await loadVehicles();

    } catch (err) {
      msg.textContent = '정리 중 오류가 발생했어요.';
      msg.className = 'msg error';
    }
  }

  loadVehicles();
</script>
</body>
</html>
