<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JS매매상사 관리자</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans KR', sans-serif; background: #f5f5f5; color: #333; }
    header {
      background: #1a3a5c;
      color: white;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 20px; font-weight: 700; }
    .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }
    .card h2 { font-size: 18px; font-weight: 700; margin-bottom: 16px; color: #1a3a5c; }
    select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      margin-bottom: 16px;
    }
    .upload-area {
      border: 2px dashed #ddd;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }
    .upload-area:hover { border-color: #1a3a5c; }
    .upload-area p { color: #999; font-size: 14px; margin-top: 8px; }
    #fileInput { display: none; }
    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .preview-item {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
    }
    .preview-item img {
      width: 100%;
      height: 120px;
      object-fit: cover;
    }
    .preview-item .delete-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      background: rgba(0,0,0,0.6);
      color: white;
      border: none;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-bottom: 8px;
    }
    .btn-primary { background: #1a3a5c; color: white; }
    .btn-primary:hover { background: #2a5a8c; }
    .btn-primary:disabled { background: #aaa; cursor: not-allowed; }
    .btn-success { background: #28a745; color: white; }
    .btn-success:hover { background: #218838; }
    .msg {
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      margin-top: 12px;
      display: none;
    }
    .msg.success { background: #d4edda; color: #155724; display: block; }
    .msg.error { background: #f8d7da; color: #721c24; display: block; }

    /* 드래그 가능한 사진 그리드 */
    .sortable-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .sortable-item {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      cursor: grab;
      border: 2px solid transparent;
      transition: border-color 0.2s, transform 0.2s;
    }
    .sortable-item:active { cursor: grabbing; }
    .sortable-item.dragging {
      opacity: 0.5;
      border-color: #1a3a5c;
      transform: scale(0.95);
    }
    .sortable-item.drag-over {
      border-color: #ffd700;
      transform: scale(1.05);
    }
    .sortable-item img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      pointer-events: none;
    }
    .sortable-item .delete-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      background: rgba(220,53,69,0.8);
      color: white;
      border: none;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .order-badge {
      position: absolute;
      bottom: 4px;
      left: 4px;
      background: rgba(0,0,0,0.6);
      color: white;
      border-radius: 12px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 700;
    }
    .first-badge {
      position: absolute;
      bottom: 4px;
      right: 4px;
      background: #ffd700;
      color: #333;
      border-radius: 12px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 700;
    }
    .drag-hint {
      font-size: 13px;
      color: #999;
      margin-bottom: 12px;
      text-align: center;
    }
    .no-photo { color: #999; font-size: 14px; text-align: center; padding: 20px; }
  </style>
</head>
<body>

<header>
  <h1>🚛 JS매매상사 관리자</h1>
  <span style="font-size:13px;opacity:0.8;">사진 관리</span>
</header>

<div class="container">

  <div class="card">
    <h2>📋 매물 선택</h2>
    <select id="vehicleSelect" onchange="loadExistingPhotos()">
      <option value="">매물을 선택하세요</option>
    </select>
  </div>

  <div class="card" id="uploadCard" style="display:none;">
    <h2>📸 사진 업로드</h2>
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
      <div style="font-size:40px;">📁</div>
      <p>클릭하여 사진 선택 (여러 장 동시 선택 가능)</p>
      <p>JPG, PNG 지원 / 장당 최대 10MB</p>
    </div>
    <input type="file" id="fileInput" multiple accept="image/*" onchange="previewFiles(event)">
    <div class="preview-grid" id="previewGrid"></div>
    <button class="btn btn-primary" id="uploadBtn" onclick="uploadPhotos()" style="display:none;">
      사진 업로드하기
    </button>
    <div class="msg" id="uploadMsg"></div>
  </div>

  <div class="card" id="existingCard" style="display:none;">
    <h2>🖼️ 등록된 사진</h2>
    <div class="drag-hint">📌 사진을 드래그해서 순서를 변경할 수 있어요. 첫 번째 사진이 대표사진이에요.</div>
    <div class="sortable-grid" id="sortableGrid"></div>
    <button class="btn btn-success" id="saveOrderBtn" onclick="saveOrder()" style="display:none;">
      ✅ 순서 저장하기
    </button>
    <div class="msg" id="orderMsg"></div>
  </div>

</div>

<script>
  const SUPABASE_URL = 'https://dreclszbtnmwfaigifpg.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRyZWNsc3pidG5td2ZhaWdpZnBnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxMjExMjMsImV4cCI6MjA5ODY5NzEyM30.IGNa8gHPb7RmYMy7h3gVa9TCgTxD2Mhon4WpA81TybE';

  let selectedFiles = [];
  let currentVehicleId = null;
  let currentImages = [];
  let dragSrcIndex = null;

  // 매물 목록 불러오기
  async function loadVehicles() {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/vehicles?select=id,plate_number,model_name&order=created_at.desc`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    const vehicles = await res.json();
    const sel = document.getElementById('vehicleSelect');
    vehicles.forEach(v => {
      const opt = document.createElement('option');
      opt.value = v.id;
      opt.textContent = `${v.plate_number} | ${v.model_name}`;
      sel.appendChild(opt);
    });
  }

  // 기존 사진 불러오기
  async function loadExistingPhotos() {
    const vehicleId = document.getElementById('vehicleSelect').value;
    if (!vehicleId) {
      document.getElementById('uploadCard').style.display = 'none';
      document.getElementById('existingCard').style.display = 'none';
      return;
    }
    currentVehicleId = vehicleId;
    document.getElementById('uploadCard').style.display = 'block';
    document.getElementById('existingCard').style.display = 'block';

    const res = await fetch(`${SUPABASE_URL}/rest/v1/vehicle_images?vehicle_id=eq.${vehicleId}&order=order_index.asc`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    currentImages = await res.json();
    renderSortableGrid();
  }

  // 드래그 가능한 사진 그리드 렌더링
  function renderSortableGrid() {
    const grid = document.getElementById('sortableGrid');
    document.getElementById('saveOrderBtn').style.display = 'none';

    if (currentImages.length === 0) {
      grid.innerHTML = '<div class="no-photo">등록된 사진이 없습니다.</div>';
      return;
    }

    grid.innerHTML = currentImages.map((img, i) => `
      <div class="sortable-item"
        draggable="true"
        data-index="${i}"
        ondragstart="dragStart(event, ${i})"
        ondragover="dragOver(event)"
        ondragenter="dragEnter(event)"
        ondragleave="dragLeave(event)"
        ondrop="dragDrop(event, ${i})"
        ondragend="dragEnd(event)">
        <img src="${img.image_url}" alt="차량사진">
        <div class="order-badge">${i + 1}번째</div>
        ${i === 0 ? '<div class="first-badge">대표사진</div>' : ''}
        <button class="delete-btn" onclick="deletePhoto(event, ${img.id}, '${img.image_url}')">✕</button>
      </div>
    `).join('');
  }

  // 드래그 이벤트
  function dragStart(event, index) {
    dragSrcIndex = index;
    event.target.classList.add('dragging');
  }

  function dragOver(event) {
    event.preventDefault();
  }

  function dragEnter(event) {
    event.currentTarget.classList.add('drag-over');
  }

  function dragLeave(event) {
    event.currentTarget.classList.remove('drag-over');
  }

  function dragDrop(event, targetIndex) {
    event.currentTarget.classList.remove('drag-over');
    if (dragSrcIndex === targetIndex) return;

    // 순서 변경
    const moved = currentImages.splice(dragSrcIndex, 1)[0];
    currentImages.splice(targetIndex, 0, moved);

    renderSortableGrid();
    document.getElementById('saveOrderBtn').style.display = 'block';
  }

  function dragEnd(event) {
    event.target.classList.remove('dragging');
    document.querySelectorAll('.sortable-item').forEach(el => el.classList.remove('drag-over'));
  }

  // 순서 저장
  async function saveOrder() {
    const btn = document.getElementById('saveOrderBtn');
    btn.disabled = true;
    btn.textContent = '저장 중...';

    for (let i = 0; i < currentImages.length; i++) {
      await fetch(`${SUPABASE_URL}/rest/v1/vehicle_images?id=eq.${currentImages[i].id}`, {
        method: 'PATCH',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ order_index: i }),
      });
    }

    btn.disabled = false;
    btn.textContent = '✅ 순서 저장하기';
    btn.style.display = 'none';

    const msg = document.getElementById('orderMsg');
    msg.textContent = '순서가 저장됐어요!';
    msg.className = 'msg success';
    setTimeout(() => { msg.className = 'msg'; }, 3000);
  }

  // 사진 미리보기
  function previewFiles(event) {
    selectedFiles = Array.from(event.target.files);
    const grid = document.getElementById('previewGrid');
    grid.innerHTML = selectedFiles.map((file, i) => `
      <div class="preview-item" id="preview-${i}">
        <img src="${URL.createObjectURL(file)}" alt="미리보기">
        <button class="delete-btn" onclick="removeFile(${i})">✕</button>
      </div>
    `).join('');
    document.getElementById('uploadBtn').style.display = selectedFiles.length > 0 ? 'block' : 'none';
  }

  // 파일 제거
  function removeFile(index) {
    selectedFiles.splice(index, 1);
    const grid = document.getElementById('previewGrid');
    grid.innerHTML = selectedFiles.map((file, i) => `
      <div class="preview-item" id="preview-${i}">
        <img src="${URL.createObjectURL(file)}" alt="미리보기">
        <button class="delete-btn" onclick="removeFile(${i})">✕</button>
      </div>
    `).join('');
    document.getElementById('uploadBtn').style.display = selectedFiles.length > 0 ? 'block' : 'none';
  }

  // 사진 업로드
  async function uploadPhotos() {
    if (!currentVehicleId || selectedFiles.length === 0) return;

    const btn = document.getElementById('uploadBtn');
    btn.disabled = true;
    btn.textContent = '업로드 중...';

    const msg = document.getElementById('uploadMsg');
    msg.className = 'msg';

    let successCount = 0;
    const startIndex = currentImages.length;

    for (let i = 0; i < selectedFiles.length; i++) {
      const file = selectedFiles[i];
      const ext = file.name.split('.').pop();
      const fileName = `${currentVehicleId}/${Date.now()}_${i}.${ext}`;

      const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/vehicle-images/${fileName}`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY,
          'Content-Type': file.type,
        },
        body: file,
      });

      if (uploadRes.ok) {
        const imageUrl = `${SUPABASE_URL}/storage/v1/object/public/vehicle-images/${fileName}`;

        await fetch(`${SUPABASE_URL}/rest/v1/vehicle_images`, {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': 'Bearer ' + SUPABASE_KEY,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal',
          },
          body: JSON.stringify({
            vehicle_id: Number(currentVehicleId),
            image_url: imageUrl,
            order_index: startIndex + i,
          }),
        });
        successCount++;
      }
    }

    btn.disabled = false;
    btn.textContent = '사진 업로드하기';
    selectedFiles = [];
    document.getElementById('previewGrid').innerHTML = '';
    document.getElementById('fileInput').value = '';

    if (successCount > 0) {
      msg.textContent = `${successCount}장 업로드 완료!`;
      msg.className = 'msg success';
      loadExistingPhotos();
    } else {
      msg.textContent = '업로드 실패. 다시 시도해주세요.';
      msg.className = 'msg error';
    }
  }

  // 사진 삭제
  async function deletePhoto(event, imgId, imageUrl) {
    event.stopPropagation();
    if (!confirm('이 사진을 삭제할까요?')) return;

    const path = imageUrl.split('vehicle-images/')[1];
    await fetch(`${SUPABASE_URL}/storage/v1/object/vehicle-images/${path}`, {
      method: 'DELETE',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
      },
    });

    await fetch(`${SUPABASE_URL}/rest/v1/vehicle_images?id=eq.${imgId}`, {
      method: 'DELETE',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
      },
    });

    currentImages = currentImages.filter(img => img.id !== imgId);
    renderSortableGrid();

    if (currentImages.length > 0) {
      document.getElementById('saveOrderBtn').style.display = 'block';
    }
  }

  loadVehicles();
</script>
</body>
</html>
