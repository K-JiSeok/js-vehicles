<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JS매매상사 관리자</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans KR', sans-serif; background: #f5f5f5; color: #333; }
    header {
      background: #1a3a5c;
      color: white;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 20px; font-weight: 700; }
    .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }
    .card h2 { font-size: 18px; font-weight: 700; margin-bottom: 16px; color: #1a3a5c; }
    select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      margin-bottom: 16px;
    }
    .upload-area {
      border: 2px dashed #ddd;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }
    .upload-area:hover { border-color: #1a3a5c; }
    .upload-area p { color: #999; font-size: 14px; margin-top: 8px; }
    #fileInput { display: none; }
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-bottom: 8px;
    }
    .btn-primary { background: #1a3a5c; color: white; }
    .btn-primary:hover { background: #2a5a8c; }
    .btn-primary:disabled { background: #aaa; cursor: not-allowed; }
    .btn-success { background: #28a745; color: white; }
    .btn-success:hover { background: #218838; }
    .btn-success:disabled { background: #aaa; cursor: not-allowed; }
    .msg {
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      margin-top: 12px;
      display: none;
    }
    .msg.success { background: #d4edda; color: #155724; display: block; }
    .msg.error { background: #f8d7da; color: #721c24; display: block; }

    /* 사진 그리드 공통 */
    .sortable-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .sortable-item {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      cursor: grab;
      border: 2px solid transparent;
      transition: border-color 0.2s;
    }
    .sortable-item:active { cursor: grabbing; }
    .sortable-item.sortable-chosen { border-color: #1a3a5c; opacity: 0.8; }
    .sortable-item.sortable-ghost { opacity: 0.3; }
    .sortable-item img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      pointer-events: none;
      user-select: none;
    }
    .sortable-item .delete-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      background: rgba(220,53,69,0.8);
      color: white;
      border: none;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .order-badge {
      position: absolute;
      bottom: 4px;
      left: 4px;
      background: rgba(0,0,0,0.6);
      color: white;
      border-radius: 12px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 700;
      pointer-events: none;
    }
    .first-badge {
      position: absolute;
      bottom: 4px;
      right: 4px;
      background: #ffd700;
      color: #333;
      border-radius: 12px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 700;
      pointer-events: none;
    }
    .new-badge {
      position: absolute;
      top: 4px;
      left: 4px;
      background: #28a745;
      color: white;
      border-radius: 12px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 700;
      pointer-events: none;
    }
    .drag-hint {
      font-size: 13px;
      color: #999;
      margin-bottom: 12px;
      text-align: center;
    }
    .no-photo { color: #999; font-size: 14px; text-align: center; padding: 20px; }
    .section-title {
      font-size: 15px;
      font-weight: 700;
      color: #1a3a5c;
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid #eee;
    }
  </style>
</head>
<body>

<header>
  <h1>🚛 JS매매상사 관리자</h1>
  <span style="font-size:13px;opacity:0.8;">사진 관리</span>
</header>

<div class="container">

  <div class="card">
    <h2>📋 매물 선택</h2>
    <select id="vehicleSelect" onchange="loadPhotos()">
      <option value="">매물을 선택하세요</option>
    </select>
  </div>

  <div id="photoCard" style="display:none;">
    <div class="card">
      <h2>🖼️ 사진 관리</h2>
      <div class="drag-hint">📌 드래그로 순서 변경 가능 · 첫 번째 사진이 대표사진이에요</div>

      <!-- 통합 사진 그리드 (기존 + 새 사진 함께) -->
      <div class="sortable-grid" id="allPhotosGrid"></div>

      <!-- 새 사진 추가 버튼 -->
      <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <div style="font-size:36px;">➕</div>
        <p>클릭하여 사진 추가 (여러 장 동시 선택 가능)</p>
        <p>JPG, PNG 지원 / 장당 최대 10MB</p>
      </div>
      <input type="file" id="fileInput" multiple accept="image/*" onchange="addNewPhotos(event)">

      <!-- 저장 버튼 -->
      <button class="btn btn-success" id="saveBtn" onclick="saveAll()">
        ✅ 저장하기
      </button>
      <div class="msg" id="saveMsg"></div>
    </div>
  </div>

</div>

<script>
  const SUPABASE_URL = 'https://dreclszbtnmwfaigifpg.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRyZWNsc3pidG5td2ZhaWdpZnBnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxMjExMjMsImV4cCI6MjA5ODY5NzEyM30.IGNa8gHPb7RmYMy7h3gVa9TCgTxD2Mhon4WpA81TybE';

  let currentVehicleId = null;
  let existingPhotos = []; // DB에 이미 있는 사진 {id, image_url}
  let newFiles = [];       // 새로 추가할 파일 {file, previewUrl}
  let deletedIds = [];     // 삭제할 사진 id 목록
  let sortableInstance = null;

  // 매물 목록 불러오기
  async function loadVehicles() {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/vehicles?select=id,plate_number,model_name&order=sort_order.asc.nullslast,created_at.desc`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    const vehicles = await res.json();
    const sel = document.getElementById('vehicleSelect');
    vehicles.forEach(v => {
      const opt = document.createElement('option');
      opt.value = v.id;
      opt.textContent = `${v.plate_number} | ${v.model_name}`;
      sel.appendChild(opt);
    });
  }

  // 매물 선택 시 사진 불러오기
  async function loadPhotos() {
    const vehicleId = document.getElementById('vehicleSelect').value;
    if (!vehicleId) {
      document.getElementById('photoCard').style.display = 'none';
      return;
    }
    currentVehicleId = vehicleId;
    newFiles = [];
    deletedIds = [];

    const res = await fetch(`${SUPABASE_URL}/rest/v1/vehicle_images?vehicle_id=eq.${vehicleId}&order=order_index.asc`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    existingPhotos = await res.json();

    document.getElementById('photoCard').style.display = 'block';
    renderAllPhotos();
  }

  // 전체 사진 그리드 렌더링 (기존 + 새 사진 통합)
  function renderAllPhotos() {
    const grid = document.getElementById('allPhotosGrid');

    if (existingPhotos.length === 0 && newFiles.length === 0) {
      grid.innerHTML = '<div class="no-photo">등록된 사진이 없습니다. 아래에서 사진을 추가해주세요.</div>';
      if (sortableInstance) { sortableInstance.destroy(); sortableInstance = null; }
      return;
    }

    // 기존 사진
    const existingHtml = existingPhotos.map((img, i) => `
      <div class="sortable-item" data-type="existing" data-id="${img.id}">
        <img src="${img.image_url}" alt="차량사진">
        <div class="order-badge">${i + 1}번째</div>
        ${i === 0 && newFiles.length === 0 ? '<div class="first-badge">대표</div>' : ''}
        <button class="delete-btn" onclick="deleteExisting(event, ${img.id})">✕</button>
      </div>
    `).join('');

    // 새 사진
    const newHtml = newFiles.map((f, i) => `
      <div class="sortable-item" data-type="new" data-index="${i}">
        <img src="${f.previewUrl}" alt="새사진">
        <div class="new-badge">새사진</div>
        <div class="order-badge">${existingPhotos.length + i + 1}번째</div>
        <button class="delete-btn" onclick="deleteNew(event, ${i})">✕</button>
      </div>
    `).join('');

    grid.innerHTML = existingHtml + newHtml;

    // 첫번째 사진 대표 배지
    updateBadges();

    // Sortable 초기화
    if (sortableInstance) sortableInstance.destroy();
    sortableInstance = new Sortable(grid, {
      animation: 150,
      ghostClass: 'sortable-ghost',
      chosenClass: 'sortable-chosen',
      onEnd: function() {
        updateBadges();
      }
    });
  }

  // 배지 업데이트
  function updateBadges() {
    const items = document.querySelectorAll('.sortable-item');
    items.forEach((item, i) => {
      const badge = item.querySelector('.order-badge');
      const firstBadge = item.querySelector('.first-badge');
      if (badge) badge.textContent = `${i + 1}번째`;
      if (firstBadge) firstBadge.remove();
      if (i === 0) {
        const newBadge = document.createElement('div');
        newBadge.className = 'first-badge';
        newBadge.textContent = '대표';
        newBadge.style.pointerEvents = 'none';
        item.appendChild(newBadge);
      }
    });
  }

  // 새 사진 추가
  function addNewPhotos(event) {
    const files = Array.from(event.target.files);
    files.forEach(file => {
      newFiles.push({
        file: file,
        previewUrl: URL.createObjectURL(file)
      });
    });
    document.getElementById('fileInput').value = '';
    renderAllPhotos();
  }

  // 기존 사진 삭제 표시
  function deleteExisting(event, imgId) {
    event.stopPropagation();
    if (!confirm('이 사진을 삭제할까요?')) return;
    deletedIds.push(imgId);
    existingPhotos = existingPhotos.filter(img => img.id !== imgId);
    renderAllPhotos();
  }

  // 새 사진 제거
  function deleteNew(event, index) {
    event.stopPropagation();
    newFiles.splice(index, 1);
    renderAllPhotos();
  }

  // 전체 저장
  async function saveAll() {
    if (!currentVehicleId) return;

    const btn = document.getElementById('saveBtn');
    btn.disabled = true;
    btn.textContent = '저장 중...';

    const msg = document.getElementById('saveMsg');
    msg.className = 'msg';

    try {
      // 1. 삭제할 사진 처리
      for (const imgId of deletedIds) {
        const imgData = [...existingPhotos, ...deletedIds.map(id => ({id}))].find(i => i.id === imgId);
        await fetch(`${SUPABASE_URL}/rest/v1/vehicle_images?id=eq.${imgId}`, {
          method: 'DELETE',
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': 'Bearer ' + SUPABASE_KEY,
          },
        });
      }

      // 2. 새 사진 업로드
      const uploadedPhotos = [];
      for (let i = 0; i < newFiles.length; i++) {
        const { file } = newFiles[i];
        const ext = file.name.split('.').pop();
        const fileName = `${currentVehicleId}/${Date.now()}_${i}.${ext}`;

        const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/vehicle-images/${fileName}`, {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': 'Bearer ' + SUPABASE_KEY,
            'Content-Type': file.type,
          },
          body: file,
        });

        if (uploadRes.ok) {
          const imageUrl = `${SUPABASE_URL}/storage/v1/object/public/vehicle-images/${fileName}`;
          uploadedPhotos.push({ image_url: imageUrl, isNew: true });
        }
      }

      // 3. 현재 그리드 순서대로 order_index 업데이트
      const items = document.querySelectorAll('.sortable-item');
      let orderIndex = 0;

      for (const item of items) {
        const type = item.getAttribute('data-type');

        if (type === 'existing') {
          const id = item.getAttribute('data-id');
          await fetch(`${SUPABASE_URL}/rest/v1/vehicle_images?id=eq.${id}`, {
            method: 'PATCH',
            headers: {
              'apikey': SUPABASE_KEY,
              'Authorization': 'Bearer ' + SUPABASE_KEY,
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ order_index: orderIndex }),
          });
          orderIndex++;
        } else if (type === 'new') {
          const index = parseInt(item.getAttribute('data-index'));
          if (uploadedPhotos[index]) {
            await fetch(`${SUPABASE_URL}/rest/v1/vehicle_images`, {
              method: 'POST',
              headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': 'Bearer ' + SUPABASE_KEY,
                'Content-Type': 'application/json',
                'Prefer': 'return=minimal',
              },
              body: JSON.stringify({
                vehicle_id: Number(currentVehicleId),
                image_url: uploadedPhotos[index].image_url,
                order_index: orderIndex,
              }),
            });
            orderIndex++;
          }
        }
      }

      msg.textContent = '저장 완료!';
      msg.className = 'msg success';

      // 새로고침
      await loadPhotos();

    } catch (err) {
      msg.textContent = '저장 중 오류가 발생했어요. 다시 시도해주세요.';
      msg.className = 'msg error';
    }

    btn.disabled = false;
    btn.textContent = '✅ 저장하기';
  }

  loadVehicles();
</script>
</body>
</html>
