<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>제이에스매매상사 - 중고화물차 전문</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1a3a5c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="JS매매상사">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans KR', sans-serif; background: #f5f5f5; color: #333; }
    header { display: none; }
    .filter-bar {
      background: white;
      padding: 16px 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      align-items: center;
    }
    .filter-bar select, .filter-bar input {
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      background: white;
    }
    .filter-bar button {
      padding: 8px 20px;
      background: #1a3a5c;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 600;
    }
    .filter-bar button:hover { background: #2a5a8c; }
    .filter-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .filter-group span { font-size: 13px; color: #666; }
    .filter-label { font-size: 13px; color: #888; font-weight: 600; }
    .count-bar { padding: 12px 20px; font-size: 14px; color: #666; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
      padding: 0 20px 20px;
    }
    .card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
    .card-img {
      width: 100%;
      aspect-ratio: 4/3;
      background: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
      font-size: 14px;
      overflow: hidden;
    }
    .card-img img { width: 100%; height: 100%; object-fit: contain; background: #f0f0f0; }
    .card-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }
    .card-title { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
    .card-price { font-size: 20px; font-weight: 700; color: #e63946; margin-bottom: 10px; }
    .card-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .tag {
      background: #f0f4f8;
      color: #1a3a5c;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .card-desc { font-size: 13px; color: #777; margin-bottom: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-height: 18px; }
    .card-contact {
      display: block;
      text-align: center;
      padding: 10px;
      background: #1a3a5c;
      color: white;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      margin-top: auto;
    }
    .card-contact:hover { background: #2a5a8c; }
    .sold-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      overflow-y: auto;
    }
    .modal-overlay.active { display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal {
      background: white;
      border-radius: 16px;
      width: 100%;
      max-width: 1100px;
      overflow: hidden;
      display: flex;
      flex-direction: row;
    }
    .modal-img-wrap {
      position: relative;
      width: 55%;
      min-width: 55%;
      background: #000;
      user-select: none;
    }
    .modal-img-slider {
      width: 100%;
      height: 580px;
      overflow: hidden;
      position: relative;
      background: #000;
    }
    .modal-img-slider img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: contain;
      transition: opacity 0.3s;
      opacity: 0;
    }
    .modal-img-slider img.active { opacity: 1; }
    .arrow-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.5);
      color: white;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      font-size: 18px;
      cursor: pointer;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .arrow-btn:hover { background: rgba(0,0,0,0.8); }
    .arrow-left { left: 10px; }
    .arrow-right { right: 10px; }
    .img-indicator {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 10;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      cursor: pointer;
      transition: background 0.2s;
    }
    .dot.active { background: white; }
    .img-counter {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.5);
      color: white;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      z-index: 10;
    }
    .modal-close {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.5);
      color: white;
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .modal-body {
      padding: 28px;
      width: 45%;
      overflow-y: auto;
      max-height: 580px;
    }
    .modal-title { font-size: 24px; font-weight: 700; margin-bottom: 10px; }
    .modal-price { font-size: 30px; font-weight: 700; color: #e63946; margin-bottom: 20px; }
    .modal-info { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    .info-item label { font-size: 14px; color: #999; display: block; margin-bottom: 4px; }
    .info-item span { font-size: 18px; font-weight: 600; }
    .modal-desc {
      background: #f8f8f8;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      color: #555;
      margin-bottom: 16px;
      line-height: 1.6;
    }
    .modal-contact {
      display: block;
      text-align: center;
      padding: 14px;
      background: #1a3a5c;
      color: white;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
    }
    .modal-contact:hover { background: #2a5a8c; }
    .loading { text-align: center; padding: 60px; color: #999; font-size: 16px; }
    @media (max-width: 700px) {
      .modal { flex-direction: column; }
      .modal-img-wrap { width: 100%; min-width: 100%; }
      .modal-img-slider { height: 260px; }
      .modal-body { width: 100%; max-height: none; }
      .grid { grid-template-columns: 1fr; padding: 0 12px 12px; }
      .filter-bar { padding: 12px; }
    }
    
    /* 배너 이미지 */
    .hero-banner {
      width: 100%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hero-banner img {
      width: 100%;
      height: auto;
      display: block;
    }
    @media (max-width: 700px) {
      .hero-banner img { min-height: 120px; object-fit: cover; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>🚛 제이에스매매상사</h1>
    <p>중고화물차 전문</p>
  </div>
  <a class="header-phone" href="tel:010-5500-4614">📞 010-5500-4614</a>
</header>

<!-- 배너 이미지 -->
<div class="hero-banner">
  <img src="/hero-bg.png" alt="제이에스매매상사 배너">
</div>

<div class="filter-bar">
  <select id="filterTonnage">
    <option value="">전체 톤수</option>
    <option value="1">1톤</option>
    <option value="2.5">2.5톤</option>
    <option value="3.5">3.5톤</option>
    <option value="5">5톤</option>
    <option value="8">8톤</option>
    <option value="8.5">8.5톤</option>
    <option value="11">11톤</option>
    <option value="15">15톤</option>
    <option value="17">17톤</option>
    <option value="18">18톤</option>
    <option value="25">25톤</option>
  </select>
  <div class="filter-group">
    <span class="filter-label">연식</span>
    <input type="number" id="filterMinYear" placeholder="시작년도" style="width:100px;">
    <span>~</span>
    <input type="number" id="filterMaxYear" placeholder="종료년도" style="width:100px;">
  </div>
  <div class="filter-group">
    <span class="filter-label">가격</span>
    <input type="number" id="filterMinPrice" placeholder="최소(만원)" style="width:100px;">
    <span>~</span>
    <input type="number" id="filterMaxPrice" placeholder="최대(만원)" style="width:100px;">
  </div>
  <select id="filterStatus">
    <option value="">전체</option>
    <option value="판매중">판매중</option>
    <option value="판매완료">판매완료</option>
  </select>
  <button onclick="applyFilter()">검색</button>
  <button onclick="resetFilter()" style="background:#888;">초기화</button>
</div>

<div class="count-bar" id="countBar">매물을 불러오는 중...</div>

<div class="grid" id="grid">
  <div class="loading">매물을 불러오는 중...</div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-img-wrap">
      <button class="modal-close" onclick="closeModalBtn()">✕</button>
      <div class="modal-img-slider" id="modalSlider"
        onmousedown="dragStart(event)"
        ontouchstart="touchStart(event)"
        ontouchend="touchEnd(event)">
      </div>
      <button class="arrow-btn arrow-left" onclick="prevImg()">&#8249;</button>
      <button class="arrow-btn arrow-right" onclick="nextImg()">&#8250;</button>
      <div class="img-counter" id="imgCounter"></div>
      <div class="img-indicator" id="imgIndicator"></div>
    </div>
    <div class="modal-body">
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-price" id="modalPrice"></div>
      <div class="modal-info" id="modalInfo"></div>
      <div class="modal-desc" id="modalDesc"></div>
      <a class="modal-contact" id="modalContact" href="#">📞 전화 문의하기</a>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://dreclszbtnmwfaigifpg.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRyZWNsc3pidG5td2ZhaWdpZnBnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxMjExMjMsImV4cCI6MjA5ODY5NzEyM30.IGNa8gHPb7RmYMy7h3gVa9TCgTxD2Mhon4WpA81TybE';

  let allVehicles = [];
  let allImages = {};
  let currentImgIndex = 0;
  let currentImgs = [];
  let dragStartX = 0;

  async function fetchVehicles() {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/vehicles?select=*&order=sort_order.asc.nullslast,created_at.desc`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    return await res.json();
  }

  async function fetchImages(vehicleIds) {
    if (vehicleIds.length === 0) return {};
    const ids = vehicleIds.join(',');
    const res = await fetch(`${SUPABASE_URL}/rest/v1/vehicle_images?vehicle_id=in.(${ids})&order=order_index.asc`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    const imgs = await res.json();
    const map = {};
    imgs.forEach(img => {
      if (!map[img.vehicle_id]) map[img.vehicle_id] = [];
      map[img.vehicle_id].push(img.image_url);
    });
    return map;
  }

  function formatPrice(price, status) {
    if (status === '판매완료') return '판매완료';
    if (!price) return '가격문의';
    if (price >= 10000) {
      const uk = Math.floor(price / 10000);
      const man = price % 10000;
      return man > 0 ? `${uk}억 ${man.toLocaleString()}만원` : `${uk}억원`;
    }
    return `${price.toLocaleString()}만원`;
  }

  function formatMileage(m) {
    if (!m) return '-';
    return m.toLocaleString() + 'km';
  }

  function getYearNum(yearStr) {
    if (!yearStr) return null;
    return parseInt(String(yearStr).substring(0, 4));
  }

  function renderCards(vehicles) {
    const grid = document.getElementById('grid');
    document.getElementById('countBar').textContent = `총 ${vehicles.length}개 매물`;
    if (vehicles.length === 0) {
      grid.innerHTML = '<div class="loading">조건에 맞는 매물이 없습니다.</div>';
      return;
    }
    grid.innerHTML = vehicles.map(v => {
      const imgs = allImages[v.id] || [];
      const imgHtml = imgs.length > 0
        ? `<img src="${imgs[0]}" alt="${v.model_name}" loading="lazy">`
        : `<div style="aspect-ratio:4/3;background:#e8e8e8;display:flex;align-items:center;justify-content:center;color:#aaa;font-size:14px;">사진 없음</div>`;
      const sold = v.status === '판매완료';
      return `
        <div class="card ${sold ? 'sold' : ''}" onclick="openModal(${v.id})">
          <div class="card-img" style="position:relative;">
            ${imgHtml}
            ${sold ? '<div class="sold-badge">판매완료</div>' : ''}
          </div>
          <div class="card-body">
            <div class="card-title">${v.model_name || '-'}</div>
            <div class="card-price">${formatPrice(v.price, v.status)}</div>
            <div class="card-tags">
              ${v.tonnage ? `<span class="tag">${v.tonnage}톤</span>` : ''}
              ${v.year ? `<span class="tag">${v.year}</span>` : ''}
              ${v.transmission ? `<span class="tag">${v.transmission}</span>` : ''}
              ${v.axle ? `<span class="tag">${v.axle}</span>` : ''}
              ${v.mileage ? `<span class="tag">${formatMileage(v.mileage)}</span>` : ''}
            </div>
            <div class="card-desc">${v.description || ''}</div>
            <a class="card-contact" href="tel:${v.contact}" onclick="event.stopPropagation()">📞 ${v.contact || '문의'}</a>
          </div>
        </div>
      `;
    }).join('');
  }

  function showImg(index) {
    currentImgIndex = index;
    const imgs = document.querySelectorAll('#modalSlider img');
    const dots = document.querySelectorAll('.dot');
    imgs.forEach((img, i) => img.classList.toggle('active', i === index));
    dots.forEach((dot, i) => dot.classList.toggle('active', i === index));
    document.getElementById('imgCounter').textContent = currentImgs.length > 0 ? `${index + 1} / ${currentImgs.length}` : '';
  }

  function prevImg() {
    if (currentImgs.length === 0) return;
    showImg((currentImgIndex - 1 + currentImgs.length) % currentImgs.length);
  }

  function nextImg() {
    if (currentImgs.length === 0) return;
    showImg((currentImgIndex + 1) % currentImgs.length);
  }

  function dragStart(e) {
    dragStartX = e.clientX;
    document.onmouseup = dragEnd;
  }

  function dragEnd(e) {
    const diff = dragStartX - e.clientX;
    if (Math.abs(diff) > 50) {
      diff > 0 ? nextImg() : prevImg();
    }
    document.onmouseup = null;
  }

  function touchStart(e) {
    dragStartX = e.touches[0].clientX;
  }

  function touchEnd(e) {
    const diff = dragStartX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 50) {
      diff > 0 ? nextImg() : prevImg();
    }
  }

  function openModal(id) {
    const v = allVehicles.find(x => x.id === id);
    if (!v) return;
    currentImgs = allImages[id] || [];
    currentImgIndex = 0;

    const slider = document.getElementById('modalSlider');
    if (currentImgs.length > 0) {
      slider.innerHTML = currentImgs.map((url, i) => `
        <img src="${url}" alt="${v.model_name}" class="${i === 0 ? 'active' : ''}">
      `).join('');
    } else {
      slider.innerHTML = `<div style="width:100%;height:100%;background:#e8e8e8;display:flex;align-items:center;justify-content:center;color:#aaa;position:absolute;">사진 없음</div>`;
    }

    document.getElementById('imgIndicator').innerHTML = currentImgs.length > 1
      ? currentImgs.map((_, i) => `<div class="dot ${i === 0 ? 'active' : ''}" onclick="showImg(${i})"></div>`).join('')
      : '';

    document.getElementById('imgCounter').textContent = currentImgs.length > 0 ? `1 / ${currentImgs.length}` : '';
    document.querySelector('.arrow-left').style.display = currentImgs.length > 1 ? 'flex' : 'none';
    document.querySelector('.arrow-right').style.display = currentImgs.length > 1 ? 'flex' : 'none';

    document.getElementById('modalTitle').textContent = v.model_name || '-';
    document.getElementById('modalPrice').textContent = formatPrice(v.price, v.status);
    document.getElementById('modalPrice').style.color = '#e63946';
    document.getElementById('modalInfo').innerHTML = `
      <div class="info-item"><label>차량번호</label><span>${v.plate_number || '-'}</span></div>
      <div class="info-item"><label>연식</label><span>${v.year || '-'}</span></div>
      ${v.tonnage ? `<div class="info-item"><label>톤수</label><span>${v.tonnage}톤</span></div>` : '<div class="info-item"></div>'}
      <div class="info-item"><label>주행거리</label><span>${formatMileage(v.mileage)}</span></div>
      ${v.horsepower ? `<div class="info-item"><label>마력수</label><span>${v.horsepower}hp</span></div>` : '<div class="info-item"></div>'}
      ${v.transmission ? `<div class="info-item"><label>미션</label><span>${v.transmission}</span></div>` : '<div class="info-item"></div>'}
      ${v.axle ? `<div class="info-item"><label>축위치</label><span>${v.axle}</span></div>` : '<div class="info-item"></div>'}
      ${v.dimensions ? `<div class="info-item"><label>제원</label><span>${v.dimensions}</span></div>` : '<div class="info-item"></div>'}
    `;

    const descEl = document.getElementById('modalDesc');
    if (v.description) {
      descEl.textContent = v.description;
      descEl.style.display = 'block';
    } else {
      descEl.textContent = '';
      descEl.style.display = 'none';
    }

    const contact = v.contact || '010-5500-4614';
    document.getElementById('modalContact').href = `tel:${contact}`;
    document.getElementById('modalContact').textContent = `📞 ${contact} 전화 문의`;
    document.getElementById('modalOverlay').classList.add('active');
  }

  function closeModal(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModalBtn();
  }

  function closeModalBtn() {
    document.getElementById('modalOverlay').classList.remove('active');
  }

  function applyFilter() {
    const tonnage = document.getElementById('filterTonnage').value;
    const minYear = Number(document.getElementById('filterMinYear').value);
    const maxYear = Number(document.getElementById('filterMaxYear').value);
    const minPrice = Number(document.getElementById('filterMinPrice').value);
    const maxPrice = Number(document.getElementById('filterMaxPrice').value);
    const status = document.getElementById('filterStatus').value;

    let filtered = allVehicles.filter(v => {
      if (tonnage && Number(v.tonnage) !== Number(tonnage)) return false;
      const yearNum = getYearNum(v.year);
      if (minYear && yearNum && yearNum < minYear) return false;
      if (maxYear && yearNum && yearNum > maxYear) return false;
      if (minPrice && v.price < minPrice) return false;
      if (maxPrice && v.price > maxPrice) return false;
      if (status && v.status !== status) return false;
      return true;
    });
    renderCards(filtered);
  }

  function resetFilter() {
    document.getElementById('filterTonnage').value = '';
    document.getElementById('filterMinYear').value = '';
    document.getElementById('filterMaxYear').value = '';
    document.getElementById('filterMinPrice').value = '';
    document.getElementById('filterMaxPrice').value = '';
    document.getElementById('filterStatus').value = '';
    renderCards(allVehicles);
  }

  async function init() {
    const vehicles = await fetchVehicles();
    allVehicles = [
      ...vehicles.filter(v => v.status !== '판매완료'),
      ...vehicles.filter(v => v.status === '판매완료'),
    ];
    const ids = allVehicles.map(v => v.id);
    allImages = await fetchImages(ids);
    renderCards(allVehicles);
  }

  init();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>
</body>
</html>
